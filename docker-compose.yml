services:
  postgres:
    image: postgres:16-alpine
    container_name: rtsc-postgres
    environment:
      POSTGRES_USER: salescoach
      POSTGRES_PASSWORD: salescoach
      POSTGRES_DB: salescoach
    ports:
      - "5432:5432"
    volumes:
      - rtsc_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U salescoach -d salescoach"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: rtsc-redis
    ports:
      - "6379:6379"
    volumes:
      - rtsc_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  rtsc_pg:
  rtsc_redis:
